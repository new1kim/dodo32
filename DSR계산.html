<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DSR/DTI 계산기</title>
  <style>
    /* 버튼 스타일 */
    button { width: 100%; background-color: #58b3e0; border: 3px solid #0eb6cc; padding: 10px; font-size: 16px; cursor: pointer; transition: all 0.5s; }
    button:hover { background-color: #a5a733; }
    button:active { background-color: #551e22; transform: scale(0.98); }

    /* 추가된 버튼 선택기 스타일 */
    .type-btn-group { display: flex; gap: 2px; justify-content: center; }
    .type-btn { 
      padding: 4px 2px; font-size: 11px; cursor: pointer; border: 1px solid #ccc; 
      background: #f9f9f9; width: 50% !important; height: 30px; 
    }
    .type-btn.active { background-color: #58b3e0; color: white; border-color: #0eb6cc; font-weight: bold; }

    /* 테이블 스타일 */
    table { margin: 10px auto 0; max-width: 600px; width: 100%; table-layout: fixed; border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 5px; }
    td:first-child { background-color: #d9f2ff; }
    .no-bg { background-color: transparent !important; }
    td input, td select { width: 95%; box-sizing: border-box; }
    body { text-align: center; font-family: sans-serif; }

    .add-btn { background-color: #4CAF50; color: #000; border: none; padding: 4px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }

    /* 버블박스 */
    #bubble-box {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.7); color: white; padding: 15px 25px;
      border-radius: 30px; font-weight: bold; display: none; z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="bubble-box">신DTI 적용</div>

  <table>
    <tr style="background-color: #d9f2ff;"><td>D S R</td><td>D T I</td><td>신 D T I</td></tr>
    <tr><td id="DSR확인" class="no-bg">-</td><td id="DIT확인" class="no-bg">-</td><td id="신DTI확인" class="no-bg">-</td></tr>
  </table>

  <table>
    <tr style="background-color: #d9f2ff;"><td rowspan="2" style="width: 20%;">월부담액</td><td>합 계</td><td>월 원금</td><td>월 이자</td></tr>
    <tr><td id="월합계" class="no-bg">-</td><td id="월원금" class="no-bg">-</td><td id="월이자" class="no-bg">-</td></tr>
  </table>

  <table style="border: 2px solid #ccc;">
    <tr><td style="width: 30%;">연소득 입력</td><td id="연소득입력" class="no-bg"><input type="text" inputmode="numeric" placeholder="연소득 입력"></td></tr>
  </table>

  <table style="margin-top: 20px;">
    <colgroup><col style="width: 40%;"><col style="width: 15%;"><col style="width: 30%;"><col style="width: 15%;"></colgroup>
    <tr><th colspan="4" style="background-color: #d9f2ff;">주담대 입력</th></tr>
    <tbody id="mortgage-inputs">
      <script>
        for(let i=1; i<=3; i++) {
          document.write(`
            <tr style="text-align: center;">
              <td id="대출원금${i}" class="no-bg">
                <input type="checkbox" id="신DTI적용${i}" style="width:15px; height:15px; vertical-align:middle;">
                <input type="text" inputmode="numeric" placeholder="대출원금${i}" style="width:70%; vertical-align:middle;">
              </td>
              <td id="대출금리${i}" class="no-bg"><input type="text" inputmode="decimal" placeholder="금리"></td>
              <td class="no-bg">
                <div class="type-btn-group">
                  <button type="button" class="type-btn active" onclick="setRepaymentType(${i}, '원리금', this)">원리금</button>
                  <button type="button" class="type-btn" onclick="setRepaymentType(${i}, '원금', this)">원금</button>
                </div>
                <input type="hidden" id="주담대상환방식${i}" value="원리금">
              </td>
              <td id="상환기간${i}" class="no-bg"><input type="text" inputmode="numeric" placeholder="기간"></td>
            </tr>
          `);
        }
      </script>
    </tbody>
  </table>

  <br>
  <table id="기타대출Table">
    <colgroup><col style="width:15%"><col style="width:40%"><col style="width:20%"><col style="width:20%"></colgroup>
    <tr style="background-color: #d9f2ff;">
      <td><button class="add-btn" onclick="기타대출행추가()">추가</button></td>
      <td>기타금액</td><td>기타금리</td><td>기타기간</td>
    </tr>
    <tr>
      <td id="기타td1" class="no-bg">[ 1 ]</td>
      <td class="no-bg"><input id="기타금액1" type="text" inputmode="numeric" placeholder="기타금액1"></td>
      <td class="no-bg"><input id="기타금리1" type="text" inputmode="numeric" placeholder="기타금리1"></td>
      <td class="no-bg"><input id="기타기간1" type="text" inputmode="numeric" placeholder="기타기간1"></td>
    </tr>
  </table>

  <script>
    /* 버튼 선택 기능 추가 */
    function setRepaymentType(index, type, btn) {
      document.getElementById(`주담대상환방식${index}`).value = type;
      const buttons = btn.parentElement.querySelectorAll('.type-btn');
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      자동계산(); // 값 변경 후 계산 호출
    }

    function showBubble() {
      const b = document.getElementById("bubble-box");
      b.style.display = "block"; setTimeout(() => b.style.display = "none", 1000);
    }

    // [기존 계산식 100% 유지]
    function 원리금균등_계산대출(amt, rate, term) {
      if (rate > 0 && term > 0 && amt > 0) {
        const mRate = rate / 12;
        const mPay = amt * mRate / (1 - Math.pow(1 + mRate, -term));
        const mInt = amt * mRate;
        return { 월상환금액: mPay, 첫달원금: mPay - mInt, 첫달이자: mInt };
      }
      return { 월상환금액: 0, 첫달원금: 0, 첫달이자: 0 };
    }

    function 원금균등_월부담액(amt, rate, term) {
      if (rate > 0 && term > 0 && amt > 0) {
        const mRate = rate / 12;
        const p = Math.round(amt / term);
        const i = Math.round(amt * mRate);
        return { 월합계: p + i, 월원금: p, 월이자: i };
      }
      return { 월합계: 0, 월원금: 0, 월이자: 0 };
    }

    function 원금균등_연간계산(amt, rate, term) {
      if (rate > 0 && term > 0 && amt > 0) {
        const mRate = rate / 12;
        const p = amt / term;
        const i = amt * mRate;
        const annualInt = ((i + (p * mRate)) / 2) * 12;
        const annualP = p * 12;
        return { 대출합계: annualInt + annualP };
      }
      return { 대출합계: 0 };
    }

    function 자동계산() {
      const income = parseFloat(document.getElementById("연소득입력").querySelector("input").value.replace(/,/g, '')) || 0;
      let sumM = 0, sumP = 0, sumI = 0;
      let dsr_mort = 0, newDti_input = 0, newDti_fix = 0;

      for (let i = 1; i <= 3; i++) {
        const amtValue = document.getElementById(`대출원금${i}`).querySelector("input[type='text']").value.replace(/,/g, '');
        const amt = parseFloat(amtValue) || 0;
        const rate = parseFloat(document.getElementById(`대출금리${i}`).querySelector("input").value) / 100 || 0;
        const term = parseInt(document.getElementById(`상환기간${i}`).querySelector("input").value) || 0;
        const type = document.getElementById(`주담대상환방식${i}`).value;
        const isNew = document.getElementById(`신DTI적용${i}`).checked;

        let res;
        if (type === "원리금") {
          const calc = 원리금균등_계산대출(amt, rate, term);
          const fix = 원리금균등_계산대출(amt, rate, 180);
          res = { m: calc.월상환금액, p: calc.첫달원금, i: calc.첫달이자, annual: calc.월상환금액 * 12, fixAnnual: fix.월상환금액 * 12 };
        } else {
          const calcM = 원금균등_월부담액(amt, rate, term);
          const calcA = 원금균등_연간계산(amt, rate, term);
          const fixA = 원금균등_연간계산(amt, rate, 180);
          res = { m: calcM.월합계, p: calcM.월원금, i: calcM.월이자, annual: calcA.대출합계, fixAnnual: fixA.대출합계 };
        }

        sumM += res.m; sumP += res.p; sumI += res.i;

        if (isNew) {
          newDti_input += res.annual;
          newDti_fix += res.fixAnnual;
        } else {
          dsr_mort += res.annual;
        }
      }

      document.getElementById("월합계").innerText = Math.round(sumM).toLocaleString() + " 원";
      document.getElementById("월원금").innerText = Math.round(sumP).toLocaleString() + " 원";
      document.getElementById("월이자").innerText = Math.round(sumI).toLocaleString() + " 원";

      const etcRows = Array.from(document.getElementById('기타대출Table').getElementsByTagName('tbody')[0].rows).slice(1);
      let etcInt = 0, etcP = 0;
      etcRows.forEach(row => {
        const eAmt = parseFloat(row.cells[1].querySelector('input').value.replace(/,/g, '')) || 0;
        const eRate = parseFloat(row.cells[2].querySelector('input').value) / 100 || 0;
        const eTerm = parseInt(row.cells[3].querySelector('input').value) || 0;
        etcInt += (eAmt * eRate);
        etcP += (eTerm > 0 ? (eAmt / eTerm) * 12 : 0);
      });

      if (income > 0) {
        const finalDsr = ((dsr_mort + etcInt + etcP + newDti_input) / income) * 100;
        const finalDti = ((dsr_mort + etcInt + newDti_input) / income) * 100;
        const finalNewDti = ((dsr_mort + etcInt + newDti_fix) / income) * 100;

        document.getElementById("DSR확인").innerText = finalDsr.toFixed(2) + "%";
        document.getElementById("DSR확인").style.backgroundColor = finalDsr >= 40 ? "#FF3636" : "";
        document.getElementById("DIT확인").innerText = finalDti.toFixed(2) + "%";
        document.getElementById("신DTI확인").innerText = finalNewDti.toFixed(2) + "%";
      }
    }

    // 입력 트리거 설정
    function addInputEvents(input, type) {
      input.addEventListener("input", () => {
        if (type === 'num') {
          let v = input.value.replace(/\D/g, '');
          input.value = v ? parseInt(v).toLocaleString() : '';
        } else if (type === 'decimal') {
          input.value = input.value.replace(/[^0-9.]/g, '');
        }
        자동계산();
      });
    }

    // 초기 주담대 이벤트 연결
    document.querySelectorAll("#연소득입력 input, #mortgage-inputs td[id^='대출원금'] input[type='text'], #mortgage-inputs td[id^='상환기간'] input").forEach(el => addInputEvents(el, 'num'));
    document.querySelectorAll("#mortgage-inputs td[id^='대출금리'] input").forEach(el => addInputEvents(el, 'decimal'));
    document.querySelectorAll("input[type='checkbox']").forEach(el => {
      el.addEventListener("change", (e) => { if(e.target.type==='checkbox' && e.target.checked) showBubble(); 자동계산(); });
    });

    // 기타대출 첫 행 이벤트
    document.getElementById("기타금액1").addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, ''); if(e.target.value) e.target.value = parseInt(e.target.value).toLocaleString(); 자동계산(); });
    document.getElementById("기타금리1").addEventListener("input", (e) => { e.target.value = e.target.value.replace(/[^0-9.]/g, ''); 자동계산(); });
    document.getElementById("기타기간1").addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, ''); 자동계산(); });

    let rowNo = 2;
    function 기타대출행추가() {
      if (document.querySelectorAll(".etc-row").length >= 9) return alert("최대 10행까지만 가능합니다.");
      const table = document.getElementById('기타대출Table').getElementsByTagName('tbody')[0];
      const newRow = table.insertRow();
      newRow.className = "etc-row";
      newRow.style.textAlign = "center";
      newRow.innerHTML = `
        <td class="no-bg">[ ${rowNo} ]</td>
        <td class="no-bg"><input type="text" inputmode="numeric"></td>
        <td class="no-bg"><input type="text" inputmode="numeric"></td>
        <td class="no-bg"><input type="text" inputmode="numeric"></td>
      `;
      const inputs = newRow.querySelectorAll("input");
      inputs[0].addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, ''); if(e.target.value) e.target.value = parseInt(e.target.value).toLocaleString(); 자동계산(); });
      inputs[1].addEventListener("input", (e) => { e.target.value = e.target.value.replace(/[^0-9.]/g, ''); 자동계산(); });
      inputs[2].addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, ''); 자동계산(); });
      rowNo++;
    }
  </script>
</body>
</html>
