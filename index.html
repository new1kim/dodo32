<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP dodo32 계산기</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: contain; /* 모바일 브라우저 끌어내림 새로고침 방지 */
    }
    
    /* 상단 버튼 컨테이너: 패딩과 높이를 조절하여 버튼이 잘리지 않도록 수정 */
    .button-container {
      display: flex;
      justify-content: center;
      align-items: center; /* 세로 정렬 맞춤 */
      gap: 7px;
      padding: 10px 10px 5px 10px; /* 아래쪽 여백을 미세 조절하여 프레임과의 간격 확보 */
      background-color: #f0f0f0;
      height: 50px; /* 버튼 높이(35px)와 패딩을 고려하여 50px로 명확히 고정 */
      box-sizing: border-box;
    }
    button {
      width: 100px;
      height: 35px;
      padding: 1px 12px;
      font-size: 13px;
      cursor: pointer;
    }  

    /* 접속자 기록 카운터 표시 텍스트 스타일 */
    .visitor-counter {
      font-size: 11px;
      color: #64748b;
      font-weight: 600;
      white-space: nowrap;
      margin-right: 3px;
    }

    /* 프레임들을 감싸는 컨테이너 구조 */
    .main-wrapper {
      display: flex;
      width: 100%;
      height: calc(100% - 50px); /* 고정된 버튼 컨테이너 높이(50px)만큼 제외 */
    }

    /* 기본 iframe 스타일 (모바일 환경 기준) */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 오른쪽 계산기 프레임 - 모바일에서는 기본적으로 숨김 */
    #calc-frame {
      display: none;
    }

    /* 태블릿 및 PC 웹 환경 (화면 너비 768px 이상) */
    @media (min-width: 768px) {
      iframe {
        width: 50%; /* 좌우 50%씩 분할 */
      }
      #calc-frame {
        display: block; /* 오른쪽 계산기 프레임 표시 */
        border-left: 1px solid #ccc; /* 시각적 구분을 위한 경계선 유지 */
      }
    }
  </style>
  <script>
    function loadPage(page) {
      const version = '250505_1'; // 버전 정보 유지
      document.getElementById('content-frame').src = `${page}?v=${version}`;
    }
    
    // 초기 로드시 오른쪽 프레임에 계산기.html을 연결하기 위한 함수 유지
    function initPages() {
      loadPage('main.html');
      
      // 오른쪽 계산기 프레임이 존재할 경우 계산기.html 로드
      const calcFrame = document.getElementById('calc-frame');
      if (calcFrame) {
        const version = '250505_1';
        calcFrame.src = `계산기.html?v=${version}`;
      }
      
      // index.html 로드 시 접속 기록 및 데이터 가져오기 실행
      startWorkerRecordAccess();
    }

    function startWorkerRecordAccess() {
      if (window.Worker) {
        // [수정 및 검토 완료] 텍스트 선 수신 후 안전하게 JSON 객체 변환을 수행하는 워커 로직
        const workerCode = `
          self.addEventListener('message', () => {
            fetch("https://script.google.com/macros/s/AKfycbxigkf7jF5UlEz2NUn1DpQj6TEh7tX0hV8ryrVtD5VzMYFC0WOz5RDIhCmS1IGZD51n/exec")
              .then(response => {
                if (!response.ok) throw new Error("HTTP 요청 실패 (상태코드: " + response.status + ")");
                return response.text(); // 어떤 형태로 데이터가 넘어오는지 가로채기 위해 text()로 먼저 받음
              })
              .then(text => {
                try {
                  const data = JSON.parse(text); // 텍스트를 JSON으로 변환 시도
                  if (data && data.count !== undefined) {
                    self.postMessage({ success: true, count: data.count });
                  } else {
                    console.error("데이터는 수신했으나 count 변수가 없습니다. 응답받은 데이터:", data);
                    self.postMessage({ success: false, error: "데이터 구조 불일치" });
                  }
                } catch (e) {
                  console.error("구글 스크립트가 JSON 형식이 아닌 에러 문서(HTML)를 보냈습니다. 받은 텍스트 내용:", text);
                  self.postMessage({ success: false, error: "JSON 파싱 실패" });
                }
              })
              .catch((error) => {
                console.error('구글 스크립트 통신 중 서버/네트워크 오류 발생:', error);
                self.postMessage({ success: false, error: "네트워크 에러" });
              });
          });
        `;
        const blob = new Blob([workerCode], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob));
        
        // 워커로부터 결과 메시지를 수신하여 상단 카운터 업데이트
        worker.addEventListener('message', (e) => {
          const counterEl = document.getElementById('today-count');
          if (counterEl) {
            if (e.data && e.data.success) {
              counterEl.textContent = `[오늘: ${e.data.count}회]`;
            } else {
              counterEl.textContent = `[연결안됨]`;
            }
          }
        });

        worker.postMessage("start");
      } else {
        console.warn("Web Worker를 지원하지 않는 브라우저입니다.");
      }
    }
  </script>

</head>
<body onload="initPages()">
  <div class="button-container">
    <span id="today-count" class="visitor-counter">[확인중...]</span>
    <button onclick="loadPage('main.html')">DTI 계산</button>
    <button onclick="loadPage('DSR계산.html')">DSR 계산</button>
    <button onclick="loadPage('MCG.html')">MCG 계산</button>
    <button onclick="loadPage('상담일지.html')">상담일지</button>
  </div>
  
  <div class="main-wrapper">
    <iframe id="content-frame" src=""></iframe>
    <iframe id="calc-frame" src=""></iframe>
  </div>
</body>
</html>
