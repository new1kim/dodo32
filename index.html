<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP dodo32 계산기</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: contain; /* 모바일 브라우저 끌어내림 새로고침 방지 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    /* 상단 버튼 컨테이너: 세련된 화이트 톤과 은은한 그림자 라인 */
    .button-container {
      display: flex;
      justify-content: flex-start; /* 왼쪽부터 차례대로 정렬 */
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      background-color: #ffffff;
      height: 54px;
      box-sizing: border-box;
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      position: relative;
      z-index: 10;
    }

    /* 접속자 기록 카운터: 시인성이 뛰어난 스카이 블루 캡슐 배지 */
    .visitor-counter {
      font-size: 11px;
      color: #0369a1;
      background-color: #e0f2fe;
      padding: 5px 10px;
      border-radius: 20px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid #bae6fd;
      cursor: pointer;
    }

    .visitor-counter:hover {
      background-color: #bfdbfe;
    }

    /* 이름 입력 영역 스타일 */
    .user-auth-container {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .user-input {
      width: 90px;
      height: 30px;
      padding: 0 8px;
      font-size: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .user-submit-btn {
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: #ffffff;
      background-color: #0f172a;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .user-submit-btn:hover {
      background-color: #334155;
    }

    /* 이름 인증 완료 전까지 숨겨질 메뉴 버튼과 본문 영역 */
    .locked-content {
      display: none !important;
    }

    /* 상단 내비게이션 버튼: 고급스러운 라운드 코너 모던 스타일 */
    .button-container button.nav-btn {
      width: 88px;
      height: 36px;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      background-color: #f1f5f9;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, color 0.2s ease;
    }  
    
    .button-container button.nav-btn:hover {
      background-color: #e2e8f0;
      color: #1e293b;
    }

    .button-container button.nav-btn:active {
      transform: scale(0.96);
    }

    /* 클릭되어 활성화된 버튼 하이라이트 블루 컬러 */
    .button-container button.active-nav {
      background-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }

    /* 프레임들을 감싸는 컨테이너 구조 */
    .main-wrapper {
      display: flex;
      width: 100%;
      height: calc(100% - 54px); /* 상단바 높이 제외 */
      gap: 0;
    }

    /* 기본 iframe 스타일 */
    iframe {
      flex: 1;
      height: 100%;
      border: none;
      border-right: 1px solid #e2e8f0;
    }

    iframe:last-child {
      border-right: none;
    }

    /* 모바일 환경 (기본): calc-frame과 consulting-frame 숨김 */
    #calc-frame,
    #consulting-frame {
      display: none;
    }

    /* PC 및 태블릿 환경 (화면 너비 768px 이상): 3프레임 분할 뷰 */
    @media (min-width: 768px) {
      #calc-frame,
      #consulting-frame {
        display: block;
      }
    }
  </style>
  <script>
    function loadPage(page, element) {
      const version = '250605_1';
      const isWideScreen = window.innerWidth >= 768;
      
      // PC/태블릿 환경에서는 content-frame(DSR 프레임)에만 로드, 모바일 환경에서도 content-frame에 로드
      document.getElementById('content-frame').src = `${page}?v=${version}`;
      
      if (element) {
        const buttons = document.querySelectorAll('.button-container button.nav-btn');
        buttons.forEach(btn => btn.classList.remove('active-nav'));
        element.classList.add('active-nav');
      }
    }
    
    function initPages() {
      // 기존에 저장된 사용자 이름이 있는지 확인
      const savedName = localStorage.getItem('calc_user_name');
      
      if (savedName) {
        // 이름이 있으면 바로 본문 해제 및 대시보드 로드
        proceedToApp(savedName);
      } else {
        // 이름이 없으면 대기 상태
        document.getElementById('today-count').textContent = "이름 입력 필요";
      }

      initLongPressLink();
    }

    // 이름 입력 후 확인을 누르거나, 기존 이름이 존재할 때 앱을 활성화하는 함수
    function proceedToApp(userName) {
      // 1. 입력창 숨기기
      document.getElementById('auth-section').style.display = 'none';
      
      // 2. 메뉴 버튼 및 본문 iframe 영역 표시
      const lockedElements = document.querySelectorAll('.locked-content');
      lockedElements.forEach(el => el.classList.remove('locked-content'));

      // 3. 화면 너비에 따라 프레임 초기화
      const version = '250605_1';
      const isWideScreen = window.innerWidth >= 768;
      
      if (isWideScreen) {
        // PC/태블릿: 3개 프레임 모두 로드
        document.getElementById('content-frame').src = `DSR계산.html?v=${version}`;
        document.getElementById('calc-frame').src = `계산기.html?v=${version}`;
        document.getElementById('consulting-frame').src = `상담일지.html?v=${version}`;
      } else {
        // 모바일: content-frame에만 로드
        document.getElementById('content-frame').src = `main.html?v=${version}`;
      }

      // 4. 이름 정보를 기록하기 위해 웹 워커 가동 및 API 호출
      startWorkerRecordAccess(userName);
    }

    // 확인 버튼 클릭 시 실행되는 함수
    function submitUserName() {
      const nameInput = document.getElementById('user-name-input');
      const name = nameInput.value.trim();
      
      if (!name) {
        alert("사용자 이름을 입력해주세요.");
        return;
      }

      localStorage.setItem('calc_user_name', name);
      proceedToApp(name);
    }

    function initLongPressLink() {
      const longPressTarget = document.getElementById('today-count');
      const linkUrl = 'https://docs.google.com/spreadsheets/d/1OBrhJa2bi26nQBZgUfMgRbk11RVM_9Xe2IPMP6BU494/edit?usp=sharing';
      let pressTimer = null;

      const startPress = () => {
        pressTimer = setTimeout(() => {
          window.open(linkUrl, '_blank');
          pressTimer = null;
        }, 3000);
      };

      const cancelPress = () => {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      };

      longPressTarget.addEventListener('mousedown', startPress);
      longPressTarget.addEventListener('touchstart', startPress, { passive: true });
      longPressTarget.addEventListener('mouseup', cancelPress);
      longPressTarget.addEventListener('mouseleave', cancelPress);
      longPressTarget.addEventListener('touchend', cancelPress);
      longPressTarget.addEventListener('touchcancel', cancelPress);
    }

    function startWorkerRecordAccess(userName) {
      if (window.Worker) {
        // 배지에 기록 진행 중임을 임시 표기
        document.getElementById('today-count').textContent = `${userName} 기록중...`;

        // 웹 워커 소스코드 내부 - 요청해주신 신규 배포 ID 적용 완료
        const workerCode = `
          self.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'start') {
              const name = encodeURIComponent(e.data.name);
              
              // 제공해주신 새로운 구글 앱스 스크립트 배포 ID 적용
              const apiUrl = "https://script.google.com/macros/s/AKfycbwW_7x4agccYUUn2BoLTpcln8auXCqYATYay3bGFy_gzT4yvuSy2Ae005hwcEBJjCaOpg/exec?name=" + name;
              
              fetch(apiUrl)
                .then(response => {
                  if (!response.ok) throw new Error("HTTP 에러");
                  return response.json(); 
                })
                .then(data => {
                  self.postMessage({ success: true, name: e.data.name });
                })
                .catch((error) => {
                  self.postMessage({ success: false, error: "통신 실패" });
                });
            }
          });
        `;
        const blob = new Blob([workerCode], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob));
        
        worker.addEventListener('message', (e) => {
          const counterEl = document.getElementById('today-count');
          if (counterEl) {
            if (e.data && e.data.success) {
              // 시트에 날짜별/유저별 카운팅 처리가 완료되면 배지에 사용자 이름을 노출합니다.
              counterEl.textContent = `${e.data.name} ✔`;
            } else {
              counterEl.textContent = `연결실패`;
            }
          }
        });

        // 워커 가동 시작
        worker.postMessage({ type: "start", name: userName });
      } else {
        console.warn("Web Worker를 지원하지 않는 브라우저입니다.");
      }
    }
  </script>

</head>
<body onload="initPages()">
  <div class="button-container">
    <span id="today-count" class="visitor-counter">확인중...</span>
    
    <div id="auth-section" class="user-auth-container">
      <input type="text" id="user-name-input" class="user-input" placeholder="이름 입력" onkeydown="if(event.key === 'Enter') submitUserName()">
      <button type="button" class="user-submit-btn" onclick="submitUserName()">확인</button>
    </div>

    <button class="nav-btn locked-content" onclick="loadPage('main.html', this)">DTI 계산</button>
    <button class="nav-btn locked-content" onclick="loadPage('DSR계산.html', this)">DSR 계산</button>
    <button class="nav-btn locked-content" onclick="loadPage('MCG.html', this)">MCG 계산</button>
    <button class="nav-btn locked-content" onclick="loadPage('상담일지.html', this)">상담일지</button>
  </div>
  
  <div class="main-wrapper locked-content">
    <iframe id="content-frame" src=""></iframe>
    <iframe id="calc-frame" src=""></iframe>
    <iframe id="consulting-frame" src=""></iframe>
  </div>
</body>
</html>
