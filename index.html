<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP dodo32 계산기</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: contain;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    /* 상단 버튼 컨테이너 */
    .button-container {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      background-color: #ffffff;
      height: 54px;
      box-sizing: border-box;
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      position: relative;
      z-index: 10;
    }

    /* 접속자 기록 카운터 */
  .visitor-counter {
  font-size: 11px;
  color: #0369a1;
  background-color: #e0f2fe;
  padding: 5px 10px;
  border-radius: 20px;
  font-weight: 700;
  white-space: nowrap;
  border: 1px solid #bae6fd;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;

  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

    .visitor-counter:hover {
      background-color: #bfdbfe;
    }
    
    .visitor-counter:active {
      transform: scale(0.97);
    }

    /* 이름 입력 영역 스타일 */
    .user-auth-container {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .user-input {
      width: 90px;
      height: 30px;
      padding: 0 8px;
      font-size: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .user-submit-btn {
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: #ffffff;
      background-color: #0f172a;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .user-submit-btn:hover {
      background-color: #334155;
    }

    .user-submit-btn:active {
      transform: scale(0.95);
      background-color: #1e293b;
    }

    .user-submit-btn.touch-active {
      transform: scale(0.95);
      background-color: #1e293b;
    }

    /* 이름 인증 완료 전까지 숨겨질 메뉴 버튼과 본문 영역 */
    .locked-content {
      display: none !important;
    }

    /* 상단 내비게이션 버튼 */
    .button-container button.nav-btn {
      width: 88px;
      height: 36px;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      background-color: #f1f5f9;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, color 0.2s ease;
      -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
    }  
    
    .button-container button.nav-btn:hover {
      background-color: #e2e8f0;
      color: #1e293b;
    }

    /* 모바일 환경 터치 피드백 효과 강화 */
    .button-container button.nav-btn:active {
      transform: scale(0.95) !important;
      background-color: #cbd5e1;
    }

    .button-container button.nav-btn.touch-active {
      transform: scale(0.95) !important;
      background-color: #cbd5e1;
    }

    .button-container button.active-nav {
      background-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }

    .button-container button.active-nav:active {
      background-color: #1d4ed8;
    }

    .button-container button.active-nav.touch-active {
      background-color: #1d4ed8;
    }

    /* 프레임들을 감싸는 메인 래퍼 */
    .main-wrapper {
      display: flex;
      width: 100%;
      height: calc(100% - 54px);
      gap: 0;
    }

    /* 개별 프레임 컨테이너 */
    .frame-container {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e2e8f0;
      box-sizing: border-box;
      position: relative;
      background-color: #ffffff;
      transition: opacity 0.2s;
    }

    .frame-container:last-child {
      border-right: none;
    }

    /* 드래그용 핸들바 */
    .drag-handle {
      display: none;
      height: 18px;
      background-color: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      cursor: grab;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .drag-handle:active {
      cursor: grabbing;
      background-color: #e2e8f0;
    }
    .drag-handle::after {
      content: "•••";
      color: #94a3b8;
      font-size: 10px;
      letter-spacing: 2px;
    }

    /* 드래그 및 드랍 관련 상태 스타일 */
    .frame-container.dragging {
      opacity: 0.4;
    }
    .frame-container.drag-over {
      border: 2px dashed #2563eb;
      background-color: rgba(37, 99, 235, 0.05);
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* 모바일 환경 기본 세팅 */
    #calc-container,
    #consulting-container {
      display: none;
    }

    /* PC 및 태블릿 (768px 이상) */
    @media (min-width: 768px) {
      #calc-container,
      #consulting-container {
        display: flex;
      }
      .drag-handle {
        display: flex; 
      }
    }
  </style>
  <script>
    // 가상 키보드 팝업 등으로 인해 프레임이 강제 새로고침되는 현상을 막기 위한 모드 저장용 변수
    let lastLayoutMode = window.innerWidth >= 768 ? 'wide' : 'mobile';
    let isResizing = false;

    function loadPage(page, element) {
      const version = '250605_1';
      const contentFrame = document.getElementById('content-frame');
      if (contentFrame) {
        if (contentFrame.contentWindow) {
          contentFrame.contentWindow.location.replace(`${page}?v=${version}`);
        } else {
          contentFrame.setAttribute('src', `${page}?v=${version}`);
        }
      }
      
      if (element) {
        const buttons = document.querySelectorAll('.button-container button.nav-btn');
        buttons.forEach(btn => btn.classList.remove('active-nav'));
        element.classList.add('active-nav');
      }
    }
    
    function initPages() {
      const savedName = localStorage.getItem('calc_user_name');
      
      if (savedName) {
        proceedToApp(savedName);
      } else {
        document.getElementById('today-count').textContent = "이름 입력 필요";
      }

      initLongPressLink();
      initDragAndDrop();
      initTouchFeedback();
      initLongPressButtons();
      
      window.addEventListener('resize', () => {
        const savedName = localStorage.getItem('calc_user_name');
        if (savedName) {
          // 모바일 입력 패드 동작 시 불필요한 새로고침 현상을 완전 원천 차단하기 위한 뷰포트 가로폭 조건 확인 검증
          const currentMode = window.innerWidth >= 768 ? 'wide' : 'mobile';
          if (currentMode !== lastLayoutMode) {
            lastLayoutMode = currentMode;
            isResizing = true;
            updateFramesSrc();
            isResizing = false;
          }
        }
      }, false);
    }

    function updateFramesSrc() {
      const version = '250605_1';
      const isWideScreen = window.innerWidth >= 768;
      
      const contentFrame = document.getElementById('content-frame');
      const calcFrame = document.getElementById('calc-frame');
      const consultingFrame = document.getElementById('consulting-frame');

      const contentSrc = contentFrame.getAttribute('src') || '';
      const calcSrc = calcFrame.getAttribute('src') || '';
      const consultingSrc = consultingFrame.getAttribute('src') || '';

      if (isWideScreen) {
        if (contentSrc === '' || contentSrc.includes('main.html')) {
          if (contentFrame.contentWindow) contentFrame.contentWindow.location.replace(`DSR계산.html?v=${version}`);
          else contentFrame.setAttribute('src', `DSR계산.html?v=${version}`);
        }
        if (calcSrc === '') {
          if (calcFrame.contentWindow) calcFrame.contentWindow.location.replace(`계산기.html?v=${version}`);
          else calcFrame.setAttribute('src', `계산기.html?v=${version}`);
        }
        if (consultingSrc === '') {
          if (consultingFrame.contentWindow) consultingFrame.contentWindow.location.replace(`상담일지.html?v=${version}`);
          else consultingFrame.setAttribute('src', `상담일지.html?v=${version}`);
        }
      } else {
        if (contentSrc === '' || !contentSrc.includes('main.html')) {
          if (contentFrame.contentWindow) contentFrame.contentWindow.location.replace(`main.html?v=${version}`);
          else contentFrame.setAttribute('src', `main.html?v=${version}`);
        }
      }
    }

    function proceedToApp(userName) {
      document.getElementById('auth-section').style.display = 'none';
      
      const lockedElements = document.querySelectorAll('.locked-content');
      lockedElements.forEach(el => el.classList.remove('locked-content'));

      updateFramesSrc();
      startWorkerRecordAccess(userName);
    }

    function submitUserName() {
      const nameInput = document.getElementById('user-name-input');
      const name = nameInput.value.trim();
      
      if (!name) {
        alert("사용자 이름을 입력해주세요.");
        return;
      }

      localStorage.setItem('calc_user_name', name);
      proceedToApp(name);
    }

    function initLongPressLink() {
      const longPressTarget = document.getElementById('today-count');
      const linkUrl = 'https://docs.google.com/spreadsheets/d/1OBrhJa2bi26nQBZgUfMgRbk11RVM_9Xe2IPMP6BU494/edit?usp=sharing';
      let pressTimer = null;

      const startPress = () => {
        pressTimer = setTimeout(() => {
          window.open(linkUrl, '_blank');
          pressTimer = null;
        }, 3000);
      };

      const cancelPress = () => {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      };

      longPressTarget.addEventListener('mousedown', startPress);
      longPressTarget.addEventListener('touchstart', startPress, { passive: true });
      longPressTarget.addEventListener('mouseup', cancelPress);
      longPressTarget.addEventListener('mouseleave', cancelPress);
      longPressTarget.addEventListener('touchend', cancelPress);
      longPressTarget.addEventListener('touchcancel', cancelPress);
    }

    function initTouchFeedback() {
      const buttons = document.querySelectorAll('.button-container button');
      
      buttons.forEach(button => {
        button.addEventListener('touchstart', function(e) {
          this.classList.add('touch-active');
        }, { passive: true });

        button.addEventListener('touchend', function(e) {
          this.classList.remove('touch-active');
        }, { passive: true });

        button.addEventListener('touchcancel', function(e) {
          this.classList.remove('touch-active');
        }, { passive: true });

        button.addEventListener('mousedown', function(e) {
          if (e.pointerType !== 'touch') {
            this.classList.add('touch-active');
          }
        });

        button.addEventListener('mouseup', function(e) {
          this.classList.remove('touch-active');
        });

        button.addEventListener('mouseleave', function(e) {
          this.classList.remove('touch-active');
        });
      });
    }

    function initLongPressButtons() {
      const navButtons = document.querySelectorAll('.button-container button.nav-btn');
      
      navButtons.forEach(button => {
        let pressTimer = null;
        let showPopupTimer = null;

        const handlePressStart = () => {
          // 1초 후 팝업 표시
          showPopupTimer = setTimeout(() => {
            showResetGuidePopup();
          }, 1000);
          
          // 2초 후 자동 초기화 (손을 떼든 말든 실행)
          pressTimer = setTimeout(() => {
            clearTimeout(showPopupTimer);
            resetFrame(button);
            pressTimer = null;  // 이미 실행됨을 표시
          }, 2000);
        };

        const handlePressEnd = () => {
          // 2초가 안 됐으면 타이머 취소
          if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
          }
          // 팝업도 아직 표시 중이면 취소
          if (showPopupTimer) {
            clearTimeout(showPopupTimer);
            showPopupTimer = null;
          }
        };

        button.addEventListener('mousedown', handlePressStart);
        button.addEventListener('touchstart', handlePressStart, { passive: true });
        
        button.addEventListener('mouseup', handlePressEnd);
        button.addEventListener('mouseleave', handlePressEnd);
        button.addEventListener('touchend', handlePressEnd, { passive: true });
        button.addEventListener('touchcancel', handlePressEnd, { passive: true });
      });
    }

    function showResetGuidePopup() {
      const existingPopup = document.getElementById('resetGuidePopup');
      if (existingPopup) existingPopup.remove();

      const popup = document.createElement('div');
      popup.id = 'resetGuidePopup';
      popup.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px 24px;
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
        z-index: 200;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        text-align: center;
        animation: slideIn 0.2s ease-out;
      `;
      
      popup.innerHTML = `
        <div style="font-size: 14px; color: #475569; line-height: 1.6;">
          <div style="margin-bottom: 8px; font-weight: 600;">2초간 누르면 초기화됩니다</div>
          <div style="font-size: 12px; color: #94a3b8;">계속 누르고 있으면 입력된 내용이 모두 삭제됩니다</div>
        </div>
      `;

      document.body.appendChild(popup);
      
      setTimeout(() => {
        if (popup.parentElement) {
          popup.style.opacity = '0';
          popup.style.transition = 'opacity 0.3s ease';
          setTimeout(() => popup.remove(), 300);
        }
      }, 1000);
    }

    function resetFrame(buttonElement) {
      const frameId = getFrameIdFromButton(buttonElement);
      if (!frameId) return;

      const frame = document.getElementById(frameId);
      if (!frame) return;

      // 해당 페이지의 LocalStorage 데이터 삭제
      const pageNames = {
        'content-frame': ['DSR', 'main', 'MCG', '상담'],
        'calc-frame': ['calculator'],
        'consulting-frame': ['consulting']
      };

      if (pageNames[frameId]) {
        const keys = Object.keys(localStorage);
        keys.forEach(key => {
          if (pageNames[frameId].some(name => key.includes(name))) {
            localStorage.removeItem(key);
          }
        });
      }

      // 프레임 새로고침
      const version = '250605_1';
      const src = frame.getAttribute('src');
      if (src) {
        const baseUrl = src.split('?')[0];
        frame.setAttribute('src', `${baseUrl}?v=${version}&t=${Date.now()}`);
      }
    }

    function getFrameIdFromButton(buttonElement) {
      const btnText = buttonElement.textContent.trim();
      const buttonMap = {
        'DTI 계산': 'content-frame',
        'DSR 계산': 'content-frame',
        'MCG 계산': 'content-frame',
        '상담일지': 'consulting-frame'
      };
      return buttonMap[btnText] || null;
    }

    function startWorkerRecordAccess(userName) {
      if (window.Worker) {
        document.getElementById('today-count').textContent = `${userName} 기록중...`;

        const workerCode = `
          self.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'start') {
              const name = encodeURIComponent(e.data.name);
              const apiUrl = "https://script.google.com/macros/s/AKfycbwW_7x4agccYUUn2BoLTpcln8auXCqYATYay3bGFy_gzT4yvuSy2Ae005hwcEBJjCaOpg/exec?name=" + name;
              
              fetch(apiUrl)
                .then(response => {
                  if (!response.ok) throw new Error("HTTP 에러");
                  return response.json(); 
                })
                .then(data => {
                  self.postMessage({ success: true, name: e.data.name });
                })
                .catch((error) => {
                  self.postMessage({ success: false, error: "통신 실패" });
                });
            }
          });
        `;
        const blob = new Blob([workerCode], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob));
        
        worker.addEventListener('message', (e) => {
          const counterEl = document.getElementById('today-count');
          if (counterEl) {
            if (e.data && e.data.success) {
              counterEl.textContent = `${e.data.name} ✔`;
            } else {
              counterEl.textContent = `연결실패`;
            }
          }
        });

        worker.postMessage({ type: "start", name: userName });
      } else {
        console.warn("Web Worker를 지원하지 않는 브라우저입니다.");
      }
    }

    function initDragAndDrop() {
      const containers = document.querySelectorAll('.frame-container');
      let draggedItem = null;

      containers.forEach((container, index) => {
        container.style.order = index + 1;

        container.addEventListener('dragstart', (e) => {
          draggedItem = container;
          setTimeout(() => container.classList.add('dragging'), 0);
          document.querySelectorAll('iframe').forEach(ifr => ifr.style.pointerEvents = 'none');
        });

        container.addEventListener('dragend', () => {
          container.classList.remove('dragging');
          draggedItem = null;
          document.querySelectorAll('iframe').forEach(ifr => ifr.style.pointerEvents = 'auto');
          containers.forEach(c => c.classList.remove('drag-over'));
        });

        container.addEventListener('dragover', (e) => {
          e.preventDefault();
        });

        container.addEventListener('dragenter', (e) => {
          e.preventDefault();
          if (draggedItem && draggedItem !== container) {
            container.classList.add('drag-over');
          }
        });

        container.addEventListener('dragleave', (e) => {
          container.classList.remove('drag-over');
        });

        container.addEventListener('drop', (e) => {
          e.preventDefault();
          container.classList.remove('drag-over');
          
          if (draggedItem && draggedItem !== container) {
            const tempOrder = container.style.order;
            container.style.order = draggedItem.style.order;
            draggedItem.style.order = tempOrder;
          }
        });
      });
    }
  </script>

</head>
<body onload="initPages()">
  <div class="button-container">
    <span id="today-count" class="visitor-counter">확인중...</span>
    
    <div id="auth-section" class="user-auth-container">
      <input type="text" id="user-name-input" class="user-input" placeholder="이름 입력" onkeydown="if(event.key === 'Enter') submitUserName()">
      <button type="button" class="user-submit-btn" onclick="submitUserName()">확인</button>
    </div>

    <button type="button" class="nav-btn locked-content" onclick="loadPage('main.html', this)">DTI 계산</button>
    <button type="button" class="nav-btn locked-content" onclick="loadPage('DSR계산.html', this)">DSR 계산</button>
    <button type="button" class="nav-btn locked-content" onclick="loadPage('MCG.html', this)">MCG 계산</button>
    <button type="button" class="nav-btn locked-content" onclick="loadPage('상담일지.html', this)">상담일지</button>
  </div>
  
  <div class="main-wrapper locked-content">
    <div id="content-container" class="frame-container" draggable="true">
      <div class="drag-handle"></div>
      <iframe id="content-frame" src=""></iframe>
    </div>
    
    <div id="calc-container" class="frame-container" draggable="true">
      <div class="drag-handle"></div>
      <iframe id="calc-frame" src=""></iframe>
    </div>
    
    <div id="consulting-container" class="frame-container" draggable="true">
      <div class="drag-handle"></div>
      <iframe id="consulting-frame" src=""></iframe>
    </div>
  </div>
</body>
</html>
