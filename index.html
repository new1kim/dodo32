<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP dodo32 계산기</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: contain; /* 모바일 브라우저 끌어내림 새로고침 방지 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    /* 상단 버튼 컨테이너: 세련된 화이트 톤과 은은한 그림자 라인 */
    .button-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      background-color: #ffffff;
      height: 54px;
      box-sizing: border-box;
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      position: relative;
      z-index: 10;
    }

    /* 상단 내비게이션 버튼: 고급스러운 라운드 코너 모던 스타일 */
    .button-container button {
      width: 88px;
      height: 36px;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      background-color: #f1f5f9;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease, color 0.2s ease;
    }  
    
    .button-container button:hover {
      background-color: #e2e8f0;
      color: #1e293b;
    }

    .button-container button:active {
      transform: scale(0.96);
    }

    /* 클릭되어 활성화된 버튼 하이라이트 블루 컬러 */
    .button-container button.active-nav {
      background-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }

    /* 접속자 기록 카운터: 시인성이 뛰어난 스카이 블루 캡슐 배지 */
    .visitor-counter {
      font-size: 11px;
      color: #0369a1;
      background-color: #e0f2fe;
      padding: 5px 10px;
      border-radius: 20px;
      font-weight: 700;
      white-space: nowrap;
      margin-right: 4px;
      border: 1px solid #bae6fd;
    }

    /* 프레임들을 감싸는 컨테이너 구조 */
    .main-wrapper {
      display: flex;
      width: 100%;
      height: calc(100% - 54px); /* 상단바 높이 제외 */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #calc-frame {
      display: none;
    }

    /* 태블릿 및 PC 웹 환경 (화면 너비 768px 이상 분할 뷰) */
    @media (min-width: 768px) {
      iframe {
        width: 50%;
      }
      #calc-frame {
        display: block;
        border-left: 1px solid #e2e8f0;
      }
    }
  </style>
  <script>
    function loadPage(page, element) {
      const version = '250505_1';
      document.getElementById('content-frame').src = `${page}?v=${version}`;
      
      if (element) {
        const buttons = document.querySelectorAll('.button-container button');
        buttons.forEach(btn => btn.classList.remove('active-nav'));
        element.classList.add('active-nav');
      }
    }
    
    function initPages() {
      const firstBtn = document.querySelector('.button-container button');
      loadPage('main.html', firstBtn);
      
      const calcFrame = document.getElementById('calc-frame');
      if (calcFrame) {
        const version = '250505_1';
        calcFrame.src = `계산기.html?v=${version}`;
      }
      
      startWorkerRecordAccess();
    }

    function startWorkerRecordAccess() {
      if (window.Worker) {
        // 브라우저 로컬 스토리지 기반 기기 고유 식별 코드(UUID) 확인 및 부여
        let deviceUuid = localStorage.getItem('calc_device_uuid');
        if (!deviceUuid) {
          deviceUuid = 'dev_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
          localStorage.setItem('calc_device_uuid', deviceUuid);
        }

        // 웹 워커 코드 내부에 수신 규격(total, unique, count) 통합 상호검증 로직 구현
        const workerCode = `
          self.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'start') {
              const uuid = e.data.uuid;
              fetch("https://script.google.com/macros/s/AKfycbwnwNiiikch_pTcja3P-7HiJN_ijbDFvIWMNbrBdXRamDkupPX6uaj-1W4D4YqoAjk/exec?uuid=" + uuid)
                .then(response => {
                  if (!response.ok) throw new Error("HTTP 에러");
                  return response.json(); 
                })
                .then(data => {
                  if (data) {
                    // 데이터 항목 매핑 검증 최적화
                    const totalCount = data.total !== undefined ? data.total : (data.count !== undefined ? data.count : 0);
                    const uniqueCount = data.unique !== undefined ? data.unique : 1;
                    self.postMessage({ success: true, total: totalCount, unique: uniqueCount });
                  } else {
                    self.postMessage({ success: false, error: "데이터 없음" });
                  }
                })
                .catch((error) => {
                  self.postMessage({ success: false, error: "통신 실패" });
                });
            }
          });
        `;
        const blob = new Blob([workerCode], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob));
        
        // 워커로부터 받은 접속 현황 데이터를 화면에 실시간 업데이트
        worker.addEventListener('message', (e) => {
          const counterEl = document.getElementById('today-count');
          if (counterEl) {
            if (e.data && e.data.success) {
              counterEl.textContent = `${e.data.total} | ${e.data.unique}`;
            } else {
              counterEl.textContent = `연결안됨`;
            }
          }
        });

        // 기기 식별정보를 담아 워커 구동 시작
        worker.postMessage({ type: "start", uuid: deviceUuid });
      } else {
        console.warn("Web Worker를 지원하지 않는 브라우저입니다.");
      }
    }
  </script>

</head>
<body onload="initPages()">
  <div class="button-container">
    <span id="today-count" class="visitor-counter">확인중...</span>
    <button onclick="loadPage('main.html', this)">DTI 계산</button>
    <button onclick="loadPage('DSR계산.html', this)">DSR 계산</button>
    <button onclick="loadPage('MCG.html', this)">MCG 계산</button>
    <button onclick="loadPage('상담일지.html', this)">상담일지</button>
  </div>
  
  <div class="main-wrapper">
    <iframe id="content-frame" src=""></iframe>
    <iframe id="calc-frame" src=""></iframe>
  </div>
</body>
</html>
